app = "invites"
primary_region = "syd"

[http_service]
auto_start_machines = true
auto_stop_machines = true
force_https = true
internal_port = 8_055
min_machines_running = 0
processes = [ "app" ]

[[mounts]]
destination = "/directus/database"
source = "directus_data"

[[vm]]
cpu_kind = "shared"
cpus = 1
memory = "1gb"
